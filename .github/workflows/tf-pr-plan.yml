name: OpenTofu Plan and Comment

on:
  pull_request:
    branches: [ "main" ]
    paths:
      - 'tofu/**'
      - 'modules/**'
      - 'helm/**'

env:
  TOFU_PATH: ./tofu

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      fmt: ${{ steps.fmt.outputs.tofu_fmt_count }}
    steps:
    - name: 'Checkout code'
      uses: 'actions/checkout@v4'
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
        repository: ${{ github.event.pull_request.head.repo.full_name }}
        ref: ${{ github.event.pull_request.head.ref }} #We need to make sure we get the right ref per the usage of add-and-commit
    
    - name: Set Up Opentofu
      uses: opentofu/setup-opentofu@v2

    - name: Check TofuFormatting 
      id: fmt
      working-directory: ${{ env.TOFU_PATH }}
      run: |
        # Check if wc is installed
        if ! command -v wc &> /dev/null; then
          echo "Error: wc command not found. This is required for formatting checks."
          exit 1
        fi
        export TF_OUTPUT=$(tofu fmt -check -recursive -no-color | wc -l)
        echo "tofu_fmt_count=$TF_OUTPUT"
        echo "tofu_fmt_count=$TF_OUTPUT" >> $GITHUB_OUTPUT
      shell: bash
      continue-on-error: true

    #- name: debug
    #  run: |
    #    echo "tofu_fmt_count: ${{ steps.fmt.outputs.tofu_fmt_count }}"
    #    echo "${{ steps.fmt.outputs.tofu_fmt_count > 0 }}"
    #    echo "stderr: ${{ steps.fmt.outputs.stderr }}"
    #  shell: bash
    
    - name: Conditionally Run if Formatting Issues Exist
      id: fmt_plan
      working-directory: ${{ env.TOFU_PATH }}
      if: ${{ steps.fmt.outputs.tofu_fmt_count > 0 }}
      run: |
        echo "Formatting issues detected. Fixing..."
        FILES_CHANGED=$(tofu fmt -diff -recursive -no-color)
        echo "tofu_fmt_list<<EOF" >> $GITHUB_OUTPUT
        echo "$FILES_CHANGED" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
        echo "Formatting issues fixed."
      shell: bash
      continue-on-error: true
    
    - name: Commit Formatting Fixes
      if: ${{ steps.fmt.outputs.tofu_fmt_count > 0  &&  !steps.fmt.outputs.stderr }}
      id: fix_fmt
      uses: EndBug/add-and-commit@v9
      with:
        author_name: 'lukeaurio'
        author_email: 'lukeaurio@proton.me'
        committer_name: GitHub Actions
        committer_email: actions@github.com
        message: 'Fix formatting issues'
        add: 'tofu/**'
    
    - name: PR Comment (if Error)
      uses: 'mshick/add-pr-comment@v2'
      if: ${{ steps.fmt.outputs.stderr }} 
      with:
        refresh-message-position: true
        message-id: ${{ github.event.pull_request.id }}-ERROR
        message: |
          ### ⚠️ Formatting Issues Detected! 🛠️
          Formatting issues were detected in the Tofu code.
          Click below to view the details of the errors:
          <details>
          <summary>🔍 View Formatting Errors</summary>

          ```
          ${{ steps.fmt.outputs.stderr }}
          ```

          </details>

          Keep trying, Kiddo! 🚀
        message-failure: |
          Errors detected in the Tofu formatting step. Please check the logs for details.
    
    - name: PR Comment (if No Error)
      uses: 'mshick/add-pr-comment@v2'
      if: ${{ fromJson(steps.fmt.outputs.tofu_fmt_count || '0') > 0 }}
      with:
        refresh-message-position: true
        message-id: ${{ github.event.pull_request.id }}-SUCCESS
        message: |
          ### ✅ Formatting Issues Resolved! 🎉
          All formatting issues have been resolved in the Tofu code.
          Make sure to thank the Bot!
          Click below to view the files that have changed:
          <details>
          <summary>🔍 View Changes</summary>

          ```
          ${{ steps.fmt_plan.outputs.tofu_fmt_list }}
          ```

          </details>

          Great job, Kiddo! 🚀
    
    - name: Potential Failure        
      if: ${{ steps.fmt.outputs.stderr }} 
      run: |
        echo "Errors found in Formatting lint detected. Failing the job."
        echo ${{ steps.fmt.outputs.stderr }}
        exit 1

  tofu_plan:
    runs-on: ubuntu-latest
    needs: setup
    permissions:
      id-token: write
      contents: write
      pull-requests: write
    if: ${{ needs.setup.outputs.fmt == 0 }}
    steps:
    - name: 'Checkout code'
      uses: 'actions/checkout@v4'
      with:
        fetch-depth: 0
        ref: ${{ github.head_ref }}

    - name: 'Authenticate with GCP'
      uses: './.github/actions/auth_to_gcp'
      with:
        gcp_project_id: ${{ secrets.GCP_PROJECT_ID }}
        gcp_workload_pool: ${{ secrets.GCP_WORKLOAD_POOL }}
        gcp_workload_provider: ${{ secrets.GCP_WORKLOAD_PROVIDER }}

    - name: 'Setup OpenTofu and Lint'
      id: tofu_plan_lint
      with:
        tofu_directory: ${{ env.TOFU_PATH }}/deployment
      uses: './.github/actions/tofu_plan_lint'
      env:
        TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
        TF_VAR_project_name: ${{ secrets.GCP_PROJECT_NAME }}
        TF_VAR_region: ${{ vars.GCP_REGION }}
        TF_VAR_zone: ${{ vars.GCP_ZONE }} 
        TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_TOKEN }}
        tfstates_bucket: ${{ secrets.TFSTATE_BUCKET }}
        tfstates_prefix: ${{ secrets.TFSTATE_PREFIX }}

    - name: Build OpenTofu PR Comments
      id: tofu_comments
      if: always()
      env:
        PLAN_SUMMARY: ${{ steps.tofu_plan_lint.outputs.plan_summary }}
        INIT_STDERR: ${{ steps.tofu_plan_lint.outputs.init_stderr }}
        VALIDATE_STDERR: ${{ steps.tofu_plan_lint.outputs.validate_stderr }}
        PLAN_STDERR: ${{ steps.tofu_plan_lint.outputs.plan_stderr }}
        PR_ID: ${{ github.event.pull_request.id }}
      run: |
        init_result="Passed"
        validate_result="Passed"
        plan_result="Passed"

        if [ -n "$INIT_STDERR" ]; then
          init_result="Failed"
        fi

        if [ -n "$VALIDATE_STDERR" ]; then
          validate_result="Failed"
        fi

        if [ -n "$PLAN_STDERR" ]; then
          plan_result="Failed"
        fi

        if [ -n "$INIT_STDERR" ] || [ -n "$VALIDATE_STDERR" ] || [ -n "$PLAN_STDERR" ]; then
          echo "message_id=$PR_ID-TOFU-ERROR" >> "$GITHUB_OUTPUT"

          {
            echo "comment_body<<TOFU_COMMENT"
            echo "###☹️ OpenTofu check failed"
            echo
            echo "| Check | Status |"
            echo "| :---- | :----- |"
            echo "| Initialization | $( [ \"$init_result\" = \"Passed\" ] && echo '✅ Passed' || echo '❌ Failed' ) |"
            echo "| Validation | $( [ \"$validate_result\" = \"Passed\" ] && echo '✅ Passed' || echo '❌ Failed' ) |"
            echo "| Plan | $( [ \"$plan_result\" = \"Passed\" ] && echo '✅ Passed' || echo '❌ Failed' ) |"

            if [ -n "$INIT_STDERR" ]; then
              echo
              echo "<details open>"
              echo "<summary>Init error</summary>"
              echo
              echo '```text'
              echo "$INIT_STDERR"
              echo '```'
              echo
              echo "</details>"
            fi

            if [ -n "$VALIDATE_STDERR" ]; then
              echo
              echo "<details open>"
              echo "<summary>Validation error</summary>"
              echo
              echo '```text'
              echo "$VALIDATE_STDERR"
              echo '```'
              echo
              echo "</details>"
            fi

            if [ -n "$PLAN_STDERR" ]; then
              echo
              echo "<details open>"
              echo "<summary>Plan error</summary>"
              echo
              echo '```text'
              echo "$PLAN_STDERR"
              echo '```'
              echo
              echo "</details>"
            fi

            echo "TOFU_COMMENT"
          } >> "$GITHUB_OUTPUT"
        else
          echo "message_id=$PR_ID-TOFU-PLAN" >> "$GITHUB_OUTPUT"

          {
            echo "comment_body<<TOFU_COMMENT"
            echo "###🦖 OpenTofu plan"
            echo
            echo "| Check | Status |"
            echo "| :---- | :----- |"
            echo "| Initialization | ✅ Passed |"
            echo "| Validation | ✅ Passed |"
            echo "| Plan | ✅ Passed |"
            echo
            echo "<details open>"
            echo "<summary><strong>Plan summary</strong></summary>"
            echo
            echo "$PLAN_SUMMARY"
            echo
            echo "</details>"
            echo "TOFU_COMMENT"
          } >> "$GITHUB_OUTPUT"
        fi
      shell: bash

    - name: PR Comment (OpenTofu)
      uses: 'mshick/add-pr-comment@v2'
      if: ${{ always() && steps.tofu_comments.outputs.comment_body }}
      with:
        refresh-message-position: true
        message-id: ${{ steps.tofu_comments.outputs.message_id }}
        message: ${{ steps.tofu_comments.outputs.comment_body }}
