cloudflare:
  secretRef:
    name: cloudflare-api-token
    accountIDKey: accountid
    tunnelNameKey: tunnelname
    apiTokenKey: apitoken

serviceAccount:
  # Specifies whether a service account should be created
  create: false
  name: "cloudflare-ingress-sa"

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 100m
    memory: 128Mi